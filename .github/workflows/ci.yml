name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Package app bundle
        run: bash scripts/package-app.sh

      - name: Verify app bundle
        run: |
          test -f build/Quickey.app/Contents/MacOS/Quickey
          test -f build/Quickey.app/Contents/Info.plist
          file build/Quickey.app/Contents/MacOS/Quickey | grep -q "Mach-O"
